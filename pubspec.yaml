name: yupgagae
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  path: ^1.9.0
  path_provider: ^2.1.5
  flutter_image_compress: ^2.4.0
  uuid: ^4.5.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  cloud_functions: ^6.3.2
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  kakao_flutter_sdk_user: ^2.0.0+1
  crypto: ^3.0.6
  flutter_native_splash: ^2.4.0
  flutter_local_notifications: ^22.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/icon_foreground.png

  android_12:
    color: "#FFFFFF"
    image: assets/icon/icon_foreground.png
    icon_background_color: "#FFFFFF"

  ios: true
  web: false
  fullscreen: false
  android_gravity: center

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png
    - assets/icon/icon_foreground.png
    - assets/icons/yupgagae_bottom_shop.png
    - assets/icons/yupgagae_notification.png